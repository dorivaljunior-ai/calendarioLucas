<body>
<select id="filtroTag" onchange="filtrarEventos()">
    <option value="">Todas as TAGs</option>
</select>
<div class="topbar">
    <h2>📅 Calendário Escolar</h2>
    <div>
        <button class="btn btn-blue" onclick="abrirModalTag()">+ TAG</button>
        <button class="btn btn-green" onclick="abrirModal()">+ Evento</button>
    </div>
</div>

<div id="calendar"></div>

<!-- MODAL EVENTO -->

<div id="modalEvento" class="modal" onclick="fecharModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Evento</h3>

    <input type="text" id="titulo" placeholder="Título">
    <input type="date" id="data">
    <select id="tag"></select>

    <button class="btn btn-green" onclick="salvarEvento()">Salvar</button>
    <button class="btn btn-red" onclick="deletarEvento()">Excluir</button>
    <button onclick="fecharModal()">Fechar</button>
</div>

        <h3>Tags</h3>

    <input type="text" id="nomeTag" placeholder="Nome da TAG">
    <input type="color" id="corTag">

    <button class="btn btn-green" onclick="criarTag()">Criar</button>

    <hr>

    <div id="listaTags"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>

let eventoEditando = null;

/* ================= CALENDÁRIO ================= */

document.addEventListener('DOMContentLoaded', function () {

    carregarTags();
    let calendar;
    calendar = new FullCalendar.Calendar(
        document.getElementById('calendar'),
        {
            initialView: 'dayGridMonth',
            locale: 'pt-br',
            events: '/eventos/',

            dateClick: function(info) {
                abrirModal();
                document.getElementById('data').value = info.dateStr;
            },

            eventClick: function(info) {
                eventoEditando = info.event.id;

                abrirModal();

                document.getElementById('titulo').value = info.event.title;
                document.getElementById('data').value = info.event.startStr;
            }
        }
    );

    calendar.render();
});


/* ================= MODAL EVENTO ================= */

function filtrarEventos() {

    let tag = document.getElementById('filtroTag').value;

    let url = '/eventos/';

    if (tag) {
        url += '?tag=' + tag;
    }

    calendar.setOption('events', url); // 🔥 jeito correto

    calendar.refetchEvents(); // 🔥 força atualização
}

function abrirModal() {
    document.getElementById('modalEvento').style.display = 'block';

    // limpa estado
    if (!eventoEditando) {
        document.getElementById('titulo').value = '';
        document.getElementById('data').value = '';
    }
}

function fecharModal() {
    document.getElementById('modalEvento').style.display = 'none';
    eventoEditando = null;
}


/* ================= EVENTOS ================= */

function salvarEvento() {

    let dados = {
        title: document.getElementById('titulo').value,
        date: document.getElementById('data').value,
        tag: document.getElementById('tag').value
    };

    if (eventoEditando) {

        fetch('/eventos/update/' + eventoEditando + '/', {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRFToken()
            },
            credentials: 'same-origin',
            body: JSON.stringify(dados)
        }).then(() => location.reload());

    } else {

        fetch('/eventos/create/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCSRFToken()
            },
            credentials: 'same-origin',
            body: JSON.stringify(dados)
        }).then(() => location.reload());
    }
}


function deletarEvento() {

    if (!eventoEditando) {
        alert("Selecione um evento para excluir");
        return;
    }

    if (!confirm("Deseja excluir este evento?")) return;

    fetch('/eventos/delete/' + eventoEditando + '/', {
        method: 'DELETE',
        headers: {
            'X-CSRFToken': getCSRFToken()
        },
        credentials: 'same-origin'
    }).then(() => location.reload());
}


/* ================= TAGS ================= */

function abrirModalTag() {
    document.getElementById('modalTag').style.display = 'block';
    listarTags();
}

function fecharModalTag() {
    document.getElementById('modalTag').style.display = 'none';
}

function carregarTags() {
    fetch('/tags/')
    .then(res => res.json())
    .then(tags => {

        let select = document.getElementById('tag');
        let filtro = document.getElementById('filtroTag');

        select.innerHTML = '';
        filtro.innerHTML = '<option value="">Todas as TAGs</option>';

        tags.forEach(tag => {

            // SELECT DO MODAL
            let option = document.createElement('option');
            option.value = tag.id;
            option.textContent = tag.nome;
            select.appendChild(option);

            // FILTRO
            let optFiltro = document.createElement('option');
            optFiltro.value = tag.id;
            optFiltro.textContent = tag.nome;
            filtro.appendChild(optFiltro);
        });
    });
}


function listarTags() {
    fetch('/tags/')
    .then(res => res.json())
    .then(tags => {

        let div = document.getElementById('listaTags');
        div.innerHTML = '';

        tags.forEach(tag => {
            let item = document.createElement('div');
            item.className = 'tag-item';

            item.innerHTML = `
                <span>${tag.nome}</span>
                <button class="btn btn-red" onclick="deletarTag(${tag.id})">X</button>
            `;

            div.appendChild(item);
        });
    });
}


function criarTag() {
    let nome = document.getElementById('nomeTag').value;
    let cor = document.getElementById('corTag').value;

    fetch('/tags/create/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCSRFToken()
        },
        credentials: 'same-origin',
        body: JSON.stringify({ nome, cor })
    }).then(() => {
        listarTags();
        carregarTags();
    });
}


function deletarTag(id) {

    if (!confirm("Excluir TAG?")) return;

    fetch('/tags/delete/' + id + '/', {
        method: 'DELETE',
        headers: {
            'X-CSRFToken': getCSRFToken()
        },
        credentials: 'same-origin'
    }).then(() => {
        listarTags();
        carregarTags();
    });
}


/* ================= CSRF ================= */

function getCSRFToken() {
    let name = 'csrftoken';
    let cookies = document.cookie.split(';');

    for (let cookie of cookies) {
        cookie = cookie.trim();
        if (cookie.startsWith(name + '=')) {
            return cookie.substring(name.length + 1);
        }
    }
    return '';
}

</script>
